<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | CropManager</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-box">
            <div class="logo" style="margin-bottom: 20px;">CropManager</div>
            <h1>Create Account</h1>
            <p>Join us to manage your agricultural data professionally.</p>
            
            <form id="signupForm">
                <input type="text" id="username" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" style="background: #16a34a; transition: 0.3s;" onmouseover="this.style.background='#15803d'" onmouseout="this.style.background='#16a34a'">Register</button>
            </form>
            
            <div class="auth-link">
                <p style="font-size: 14px; color: #64748b;">Already have an account? <a href="../pages/login.html" style="color: #16a34a; text-decoration: none; font-weight: 500;">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
