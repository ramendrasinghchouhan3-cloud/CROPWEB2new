<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CropManager</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
    (function () {
        const savedTheme = localStorage.getItem("appTheme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
    })();
</script>
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-box">
            <div class="logo" style="margin-bottom: 20px;">CropManager</div>
            <h1>Welcome Back</h1>
            <p>Login to access your professional dashboard.</p>
            
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email Address" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" style="background: #38bdf8; transition: 0.3s;" onmouseover="this.style.background='#0ea5e9'" onmouseout="this.style.background='#38bdf8'">Login</button>
            </form>
            
            <div class="auth-link">
                <p style="font-size: 14px; color: #64748b;">Don't have an account? <a href="../auth/signup.html" style="color: #38bdf8; text-decoration: none; font-weight: 500;">Signup here</a></p>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    
</body>
</html>
